<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 | 竹塑新生</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <section class="auth-section">
    <div class="auth-box">
      <h2>注册成为竹塑新生合作伙伴</h2>
      <form class="auth-form">
        <div class="form-group">
          <label for="company">公司/团队名称</label>
          <input type="text" id="company" placeholder="请输入公司或团队名称" required>
        </div>
        <div class="form-group">
          <label for="contact">联系人</label>
          <input type="text" id="contact" placeholder="请输入联系人姓名" required>
        </div>
        <div class="form-group">
          <label for="email">邮箱</label>
          <input type="email" id="email" placeholder="请输入联系邮箱" required>
        </div>
        <div class="form-group">
          <label for="phone">电话</label>
          <input type="tel" id="phone" placeholder="请输入联系电话" required>
        </div>
        <div class="form-group">
          <label for="password">设置密码</label>
          <input type="password" id="password" placeholder="请设置密码（至少8位）" required>
        </div>
        <button type="submit" class="auth-btn">注册</button>
      </form>
      <div class="auth-footer">
        <p>已有账号？<a href="login.html">立即登录</a></p>
        <p><a href="index.html">返回首页</a></p>
      </div>
    </div>
  </section>
</body>
</html>
